---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-postgresql-data
  labels:
    app: immich
spec:
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-model-cache
  labels:
    app: immich
spec:
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-data
  labels:
    app: immich
spec:
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: Pod
metadata:
  name: immich
  labels:
    app: immich
  annotations:
    io.containers.autoupdate/immich-ml: registry
    io.containers.autoupdate/immich-server: registry
spec:
  containers:
  - name: redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
  - name: postgresql
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    env:
    - name: POSTGRES_USER
      value: immich
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: immich-postgresql 
    - name: POSTGRES_DB
      value: immich
    - name: POSTGRES_INITDB_ARGS
      value: --data-checksums
    volumeMounts:
    - name: postgresql-data
      mountPath: /var/lib/postgresql/data
  - name: immich-ml
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumeMounts:
    - name: model-cache
      mountPath: /cache
  - name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    ports:
    - containerPort: 2283
      hostPort: 2283
    env:
    - name: DB_HOSTNAME
      value: localhost
    - name: DB_USERNAME
      value: immich
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: immich-postgresql 
    - name: DB_DATABASE_NAME
      value: immich
    - name: REDIS_HOSTNAME
      value: localhost
    volumeMounts:
    - name: immich-data
      mountPath: /usr/src/app/upload
    - name: localtime
      mountPath: /etc/localtime
    - name: pictures
      mountPath: /mnt/Pictures
      readOnly: true
  volumes:
  - name: postgresql-data
    persistentVolumeClaim:
      claimName: immich-postgresql-data
  - name: model-cache
    persistentVolumeClaim:
      claimName: immich-model-cache
  - name: immich-data
    persistentVolumeClaim:
      claimName: immich-data
  - name: localtime
    hostPath:
      path: /etc/localtime
      type: File
  - name: pictures
    hostPath:
      path: /var/local/pictures
      type: Directory
